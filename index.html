<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Botkyrka V6 MAX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:220px;background:#0f1b2e;display:flex;flex-direction:column}
.logo{padding:16px;font-weight:800;font-size:18px}
.logo span{color:#ff9800}
.nav{display:flex;flex-direction:column}
.nav div{padding:12px 16px;cursor:pointer;color:#94a3b8}
.nav div.active{background:#ff9800;color:#fff}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}
.top{display:flex;gap:10px;padding:10px;background:#0f1b2e}
.btn{background:#1e293b;border:none;padding:10px;border-radius:10px;color:#fff}
.btn.orange{background:#ff9800}

#map{height:40vh}

.content{flex:1;overflow:auto;padding:10px}
.card{background:#020617;border-radius:12px;padding:10px;margin-bottom:8px}

input,select{width:100%;padding:10px;margin-bottom:8px;border-radius:10px;border:none}

.badge{padding:4px 8px;border-radius:8px;font-size:12px}
.red{background:#dc2626}
.orange{background:#f59e0b}
.yellow{background:#eab308}
.green{background:#16a34a}

.group{margin-bottom:10px}
.group h3{margin:5px 0}
.item{background:#111827;padding:8px;border-radius:10px;margin-bottom:4px;display:flex;justify-content:space-between}

</style>
</head>
<body>

<div class="app">

<div class="sidebar">
<div class="logo">VA<span>Botkyrka</span></div>
<div class="nav">
<div class="active" onclick="view('register')">Registrera</div>
<div onclick="view('actions')">Åtgärder</div>
<div onclick="view('stats')">Statistik</div>
</div>
</div>

<div class="main">

<div class="top">
<button class="btn" onclick="gps()">GPS</button>
<button class="btn" onclick="needle()">Nål</button>
</div>

<div id="map"></div>

<div class="content">

<div id="register">
<div class="card">
<select id="type"><option>VAV</option><option>VSP</option><option>VBP</option></select>
<input id="num" placeholder="1234">
<select id="status">
<option>Trasig</option>
<option>Trög</option>
<option>Övertäckt</option>
<option>Betäckning defekt</option>
<option>Hittar ej</option>
<option>OK</option>
</select>
<input id="note" placeholder="Notering">
<button class="btn orange" onclick="save()">Spara</button>
</div>
</div>

<div id="actions" style="display:none"></div>
<div id="stats" style="display:none"></div>

</div>

</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
let map=L.map('map').setView([59.2,17.8],13)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let cluster=L.markerClusterGroup()
map.addLayer(cluster)

let data=JSON.parse(localStorage.getItem('va'))||[]
let placing=false
let tempMarker=null

function needle(){placing=true}

map.on('click',e=>{
if(!placing)return
if(tempMarker)cluster.removeLayer(tempMarker)
tempMarker=L.marker(e.latlng).addTo(cluster)
placing=false
})

function gps(){
navigator.geolocation.getCurrentPosition(p=>{
map.setView([p.coords.latitude,p.coords.longitude],16)
L.marker([p.coords.latitude,p.coords.longitude]).addTo(cluster)
})
}

function save(){
let obj={
id:Date.now(),
type:type.value,
num:type.value+num.value,
status:status.value,
note:note.value,
lat:tempMarker?tempMarker.getLatLng().lat:59.2,
lng:tempMarker?tempMarker.getLatLng().lng:17.8
}

data.push(obj)
localStorage.setItem('va',JSON.stringify(data))
render()
}

function render(){
cluster.clearLayers()
let actions=document.getElementById('actions')
actions.innerHTML=''

let groups={}

data.forEach(v=>{
if(!groups[v.status])groups[v.status]=[]
groups[v.status].push(v)

let m=L.marker([v.lat,v.lng])
cluster.addLayer(m)
})

Object.keys(groups).forEach(k=>{
let g=document.createElement('div')
g.className='group'
g.innerHTML=`<h3>${k} (${groups[k].length})</h3>`

groups[k].forEach(v=>{
let i=document.createElement('div')
i.className='item'
i.innerHTML=`${v.num} <span>${v.note}</span>`
g.appendChild(i)
})

actions.appendChild(g)
})
}

function view(v){
document.getElementById('register').style.display='none'
document.getElementById('actions').style.display='none'
document.getElementById('stats').style.display='none'
document.getElementById(v).style.display='block'
}

render()
</script>

</body>
</html>
